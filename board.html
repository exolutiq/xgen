<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURONIC | Q&A Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="scripts/data.js"></script>
    <style>
        .board-container {
            padding: 120px 20px 60px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 80vh;
        }

        .board-post {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .board-post h3 {
            color: #00ffc3;
            margin-top: 0;
        }

        .board-post p {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .board-meta {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .board-reply {
            background: rgba(0, 136, 255, 0.1);
            border-left: 4px solid #0088ff;
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
        }

        .board-reply strong {
            color: #0088ff;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>

<body class="dark-theme">
    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-text">NEURONIC</span>
                <span class="logo-sub">AI & REGULATORY</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html#hero">HOME</a></li>
                <li><a href="index.html#expertise">EXPERTISE</a></li>
                <li><a href="index.html#profile">MAESTRO</a></li>
                <li><a href="index.html#timeline">MAESTRO'S PATH</a></li>
                <li><a href="index.html#contact">CONSULTING</a></li>
                <li><a href="board.html">Q&A BOARD</a></li>
            </ul>
        </div>
    </nav>

    <div class="board-container">
        <h2 class="section-title" style="text-align: center;">Q&A <span class="highlight">Board</span></h2>
        <p style="text-align:center; margin-bottom:40px; color:#aaa;">고객님들의 문의 사항과 답변을 확인하실 수 있습니다.<br /><small>(로컬 브라우저
                데이터 기준)</small></p>

        <div id="board-posts">
            <div style="text-align:center; color:#00ffc3;">Loading posts...</div>
        </div>

        <div style="text-align:center; margin-top: 40px;">
            <a href="index.html#contact" class="btn btn-primary">문의 작성하기</a>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 NEURONIC AI & REGULATORY. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const data = window.AppData.getAll();
                const container = document.getElementById('board-posts');

                if (data.board && data.board.length > 0) {
                    container.innerHTML = data.board.map(post => `
                        <div class="board-post">
                            <h3>${post.category === 'etc' ? '기타 문의' : (post.category === 'ra' ? '인허가(RA) 전략 자문' : (post.category === 'ai' ? 'AI 모델링 및 기술 자문' : (post.category === 'biz' ? '비즈니스 파트너십' : post.category)))}</h3>
                            <div class="board-meta">
                                <span><strong>작성자:</strong> ${post.name.substring(0, 1)}** </span> | 
                                <span><strong>작성일:</strong> ${post.created_at ? post.created_at.split(' ')[0] : '방금 전'}</span>
                            </div>
                            <p>${post.message.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>
                            ${post.reply ? `
                                <div class="board-reply">
                                    <strong><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:text-bottom;margin-right:5px;"><path d="M3 15v4c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-4M17 9l-5-5-5 5M12 4v12"/></svg> 관리자 답변</strong>
                                    <p style="margin:0;">${post.reply.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\\n/g, "<br>")}</p>
                                </div>
                            ` : ''}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="text-align:center; color: #888;">아직 작성된 문의가 없습니다.</p>';
                }
            } catch (err) {
                console.error("Failed to load boards", err);
                document.getElementById('board-posts').innerHTML = '<p style="text-align:center; color: red;">데이터를 불러오는 데 실패했습니다.</p>';
            }
        });
    </script>
</body>

</html>
